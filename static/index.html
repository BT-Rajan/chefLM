<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChefLM — Milkshake Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF6E9;
    --cream-deep: #FBEAD2;
    --strawberry: #E8566B;
    --strawberry-deep: #C93F53;
    --mint: #7FB88F;
    --choc: #3D2B23;
    --choc-soft: #6B564C;
    --line: rgba(61,43,35,0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(232,86,107,0.08) 0, transparent 45%),
      radial-gradient(circle at 92% 88%, rgba(127,184,143,0.10) 0, transparent 45%);
    font-family: 'Karla', sans-serif;
    color: var(--choc);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  .topbar {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand .scoop {
    width: 34px;
    height: 34px;
    border-radius: 50% 50% 46% 46%;
    background: linear-gradient(145deg, var(--strawberry), var(--strawberry-deep));
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    position: relative;
  }
  .brand .scoop::after {
    content: "";
    position: absolute;
    top: -7px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 10px;
    background: var(--mint);
    border-radius: 3px 3px 0 0;
  }

  .brand h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 24px;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .brand span.tag {
    display: block;
    font-family: 'Karla', sans-serif;
    font-weight: 500;
    font-size: 11.5px;
    color: var(--choc-soft);
    letter-spacing: 0.3px;
  }

  .lang-toggle {
    display: flex;
    background: var(--cream-deep);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .lang-toggle button {
    border: none;
    background: transparent;
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--choc-soft);
    transition: background 0.18s ease, color 0.18s ease;
  }
  .lang-toggle button.active {
    background: var(--strawberry);
    color: white;
  }

  .menu-board {
    width: 100%;
    max-width: 640px;
    background: white;
    border-radius: 20px;
    border: 1.5px solid var(--line);
    box-shadow: 0 10px 30px rgba(61,43,35,0.07);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 62vh;
    min-height: 420px;
  }

  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.48;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--strawberry);
    color: white;
    border-bottom-right-radius: 4px;
  }
  [dir="rtl"] .msg.user { border-bottom-right-radius: 16px; border-bottom-left-radius: 4px; }

  .msg.chef {
    align-self: flex-start;
    background: var(--cream-deep);
    color: var(--choc);
    border-bottom-left-radius: 4px;
  }
  [dir="rtl"] .msg.chef { border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }

  .msg.chef .label {
    display: block;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--strawberry-deep);
    margin-bottom: 3px;
    letter-spacing: 0.3px;
  }

  .msg.typing { font-style: italic; color: var(--choc-soft); }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--choc-soft);
    font-size: 14px;
    padding: 20px;
  }
  .empty-state .big {
    font-family: 'Baloo 2', sans-serif;
    font-size: 17px;
    color: var(--choc);
    margin-bottom: 6px;
  }

  form.composer {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-top: 1.5px solid var(--line);
    background: var(--cream-deep);
  }
  form.composer input {
    flex: 1;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 11px 18px;
    font-family: 'Karla', sans-serif;
    font-size: 14.5px;
    background: white;
    color: var(--choc);
    outline: none;
  }
  form.composer input:focus { border-color: var(--strawberry); }
  form.composer button {
    border: none;
    background: var(--strawberry);
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 0 22px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  form.composer button:hover { background: var(--strawberry-deep); }
  form.composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .footnote {
    max-width: 640px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: var(--choc-soft);
    margin-top: 14px;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="scoop"></div>
      <div>
        <h1>ChefLM</h1>
        <span class="tag">a very small model, a very big opinion on milkshakes</span>
      </div>
    </div>
    <div class="lang-toggle" role="group" aria-label="Reply language">
      <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
      <button id="btn-ar" onclick="setLang('ar')">AR</button>
    </div>
  </div>

  <div class="menu-board">
    <div class="thread" id="thread">
      <div class="empty-state" id="empty-state">
        <div class="big">Ask Chef about milkshakes 🍓</div>
        <div>Flavors, technique, opinions — Chef has takes.</div>
      </div>
    </div>
    <form class="composer" id="composer">
      <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <div class="footnote" id="footnote">Running locally · replies in English</div>

<script>
  let lang = "en";
  const thread = document.getElementById('thread');
  const emptyState = document.getElementById('empty-state');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const footnote = document.getElementById('footnote');

  const footnotes = {
    en: "Running locally · replies in English",
    ar: "يعمل محليًا · يرد بالعربية"
  };

  function setLang(l) {
    lang = l;
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
    document.documentElement.dir = (l === 'ar') ? 'rtl' : 'ltr';
    document.documentElement.lang = l;
    footnote.textContent = footnotes[l];
    input.placeholder = (l === 'ar') ? 'اكتب رسالة…' : 'Type a message…';
  }

  // Pick up the server's default language on load
  fetch('/api/default-lang').then(r => r.json()).then(d => {
    if (d.lang === 'ar') setLang('ar');
  }).catch(() => {});

  function addMessage(role, text) {
    emptyState.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'chef');
    if (role !== 'user') {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = 'Chef';
      div.appendChild(label);
    }
    const body = document.createElement('span');
    body.textContent = text;
    div.appendChild(body);
    thread.appendChild(div);
    thread.scrollTop = thread.scrollHeight;
    return div;
  }

  document.getElementById('composer').addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    sendBtn.disabled = true;

    const typingDiv = addMessage('chef', 'thinking…');
    typingDiv.classList.add('typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, lang })
      });
      const data = await res.json();
      typingDiv.classList.remove('typing');
      typingDiv.querySelector('span:last-child').textContent =
        data.reply || '(no reply — check the server console)';
    } catch (err) {
      typingDiv.classList.remove('typing');
      typingDiv.querySelector('span:last-child').textContent =
        'Could not reach the local ChefLM server.';
    }
    sendBtn.disabled = false;
    input.focus();
  });
</script>

</body>
</html>
